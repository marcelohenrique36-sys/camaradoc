<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo Morto Digital - Câmara Municipal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-primary {
            @apply bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition;
        }
        .btn-secondary {
            @apply bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded transition;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <div id="loginScreen" class="flex items-center justify-center min-h-screen">
            <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
                <div class="text-center mb-6">
                    <h1 class="text-3xl font-bold text-gray-800">Arquivo Morto Digital</h1>
                    <p class="text-gray-600 mt-2">Sistema de Gestão Documental</p>
                </div>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="loginEmail" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="usuario@camara.gov.br">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <input type="password" id="loginSenha" required 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="********">
                    </div>
                    <button type="submit" class="w-full btn-primary">
                        Entrar
                    </button>
                    <div id="loginError" class="hidden text-red-600 text-sm text-center"></div>
                </form>
            </div>
        </div>

        <div id="dashboardScreen" class="hidden">
            <nav class="bg-blue-600 text-white shadow-lg">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between items-center h-16">
                        <div class="flex items-center">
                            <h1 class="text-xl font-bold">Arquivo Morto Digital</h1>
                        </div>
                        <div class="flex items-center space-x-4">
                            <span id="usuarioNome" class="text-sm"></span>
                            <span id="usuarioTipo" class="text-xs bg-blue-500 px-2 py-1 rounded"></span>
                            <button onclick="logout()" class="btn-secondary">Sair</button>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-gray-500 text-sm font-medium mb-2">Total de Documentos</h3>
                        <p id="totalDocs" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-gray-500 text-sm font-medium mb-2">Uploads Hoje</h3>
                        <p id="uploadsHoje" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-gray-500 text-sm font-medium mb-2">Última Busca</h3>
                        <p id="ultimaBusca" class="text-sm text-gray-600">Nenhuma</p>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Busca Inteligente</h2>
                    <div class="flex gap-4">
                        <input type="text" id="buscaInput" 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="Digite para buscar em documentos digitalizados...">
                        <button onclick="buscarDocumentos()" class="btn-primary">
                            Buscar
                        </button>
                    </div>
                </div>

                <div id="permissaoUpload" class="bg-white rounded-lg shadow-lg p-6 mb-8 hidden">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Upload de Documento</h2>
                    <form id="uploadForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                                <input type="text" id="uploadTitulo" required 
                                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Setor</label>
                                <input type="text" id="uploadSetor" required 
                                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                            <textarea id="uploadDescricao" rows="3" 
                                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Arquivo (PDF, JPG, PNG)</label>
                            <input type="file" id="uploadArquivo" required accept=".pdf,.jpg,.jpeg,.png"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <button type="submit" class="btn-primary">
                            Enviar Documento
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Resultados</h2>
                    <div id="resultadosContainer" class="space-y-4">
                        <p class="text-gray-500 text-center py-8">Use a busca acima para encontrar documentos</p>
                    </div>
                </div>

                <div id="permissaoAdmin" class="hidden mt-8 bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Logs de Auditoria</h2>
                    <button onclick="carregarLogs()" class="btn-primary mb-4">
                        Carregar Logs
                    </button>
                    <div id="logsContainer" class="overflow-x-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let token = null;
        let usuarioAtual = null;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (!response.ok) throw new Error('Credenciais inválidas');

                const data = await response.json();
                token = data.access_token;
                usuarioAtual = data.usuario;

                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                document.getElementById('usuarioNome').textContent = usuarioAtual.nome;
                document.getElementById('usuarioTipo').textContent = usuarioAtual.tipo.toUpperCase();

                if (usuarioAtual.tipo !== 'consulta') {
                    document.getElementById('permissaoUpload').classList.remove('hidden');
                }

                if (usuarioAtual.tipo === 'administrador') {
                    document.getElementById('permissaoAdmin').classList.remove('hidden');
                }

            } catch (error) {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = 'Erro ao fazer login: ' + error.message;
                errorDiv.classList.remove('hidden');
            }
        });

        async function buscarDocumentos() {
            const termo = document.getElementById('buscaInput').value;
            if (!termo) return alert('Digite um termo de busca');

            try {
                const response = await fetch(`${API_BASE}/api/documentos/buscar?q=${encodeURIComponent(termo)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const documentos = await response.json();
                const container = document.getElementById('resultadosContainer');

                if (documentos.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-8">Nenhum documento encontrado</p>';
                    return;
                }

                container.innerHTML = documentos.map(doc => `
                    <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg text-gray-800">${doc.titulo}</h3>
                                <p class="text-sm text-gray-600 mt-1">${doc.descricao || 'Sem descrição'}</p>
                                <div class="flex gap-4 mt-2 text-xs text-gray-500">
                                    <span>Setor: ${doc.setor}</span>
                                    <span>Data: ${new Date(doc.data_upload).toLocaleDateString('pt-BR')}</span>
                                    <span>Responsável: ${doc.responsavel_nome}</span>
                                </div>
                            </div>
                            <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">${doc.tipo_arquivo}</span>
                        </div>
                    </div>
                `).join('');

                document.getElementById('ultimaBusca').textContent = termo;

            } catch (error) {
                alert('Erro ao buscar documentos: ' + error.message);
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('arquivo', document.getElementById('uploadArquivo').files[0]);
            formData.append('titulo', document.getElementById('uploadTitulo').value);
            formData.append('setor', document.getElementById('uploadSetor').value);
            formData.append('descricao', document.getElementById('uploadDescricao').value);

            try {
                const response = await fetch(`${API_BASE}/api/documentos/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (!response.ok) throw new Error('Erro no upload');

                alert('Documento enviado com sucesso! OCR processado.');
                document.getElementById('uploadForm').reset();

            } catch (error) {
                alert('Erro ao enviar documento: ' + error.message);
            }
        });

        async function carregarLogs() {
            try {
                const response = await fetch(`${API_BASE}/api/logs`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const logs = await response.json();
                const container = document.getElementById('logsContainer');

                container.innerHTML = `
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Usuário</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ação</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Descrição</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">IP</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Data/Hora</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            ${logs.map(log => `
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">${log.usuario}</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">${log.acao}</td>
                                    <td class="px-6 py-4 text-sm">${log.descricao || '-'}</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">${log.ip_origem || '-'}</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">${new Date(log.data_hora).toLocaleString('pt-BR')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

            } catch (error) {
                alert('Erro ao carregar logs: ' + error.message);
            }
        }

        function logout() {
            token = null;
            usuarioAtual = null;
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginForm').reset();
        }

        document.getElementById('buscaInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarDocumentos();
        });
    </script>
</body>
</html>
