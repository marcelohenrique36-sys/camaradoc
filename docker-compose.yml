version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: arquivo_morto_db
    environment:
      POSTGRES_USER: arquivo_user
      POSTGRES_PASSWORD: senha_segura
      POSTGRES_DB: arquivo_morto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - arquivo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arquivo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: arquivo_morto_backend
    environment:
      DATABASE_URL: postgresql://arquivo_user:senha_segura@db:5432/arquivo_morto
      SECRET_KEY: chave-jwt-super-secreta-troque-em-producao-12345
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - arquivo_network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: arquivo_morto_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - arquivo_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  arquivo_network:
    driver: bridge
